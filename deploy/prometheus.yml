global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'service_orders'
    static_configs:
      - targets: ['service_orders:8001']

  - job_name: 'service_payments'
    static_configs:
      - targets: ['service_payments:8002']

  - job_name: 'service_auth'
    static_configs:
      - targets: ['service_auth:8003']

  - job_name: 'service_notifications'
    static_configs:
      - targets: ['service_notifications:8004']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']